name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv sync

      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: PYTHONPATH=. uv run pytest
      - run: PYTHONPATH=. uv run mypy .
